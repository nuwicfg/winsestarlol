    <div class="about-container">
        <div class="about-layout">

                <div class="about-description" id="typewriterTarget">

                </div>

    <!-- SCRIPT ENGINES -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Background Particles
            if (window.particlesJS) {
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 80 },
                        color: { value: '#facc15' },
                        opacity: { value: 0.2 },
                        size: { value: 1 },
                        line_linked: { enable: true, distance: 150, color: '#facc15', opacity: 0.1, width: 1 },
                        move: { enable: true, speed: 1 }
                    }
                });
            }

            // Typewriter Logic
            const target = document.getElementById('typewriterTarget');
            const text = "Merhaba, ben Winse. İleri düzey web çözümleri, dijital estetik ve Sovereign sistemlerinin mimarıyım. Modern web deneyiminin sınırlarını zorlamayı, statik sayfaları yaşayan birer dijital sanat eserine dönüştürmeyi hedefliyorum. Her piksel bir amaca hizmet etmeli, her animasyon bir hikaye anlatmalıdır.";
            
            let i = 0;
            target.innerHTML = '<span class="tw-content"></span><span class="typewriter-cursor-info"></span>';
            const contentSpan = target.querySelector('.tw-content');

            function typeWriter() {
                if (i < text.length) {
                    contentSpan.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 35);
                }
            }
            setTimeout(typeWriter, 1000);

            // Cursor Glow Logic
            const glow = document.getElementById('cursorGlow');
            window.addEventListener('mousemove', e => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
            });

            // Sidebar Toggle Logic
            window.toggleSidebarV10 = function() {
                const sidebar = document.getElementById('socialSidebar');
                const btn = document.getElementById('sidebarToggle');
                sidebar.classList.toggle('closed');
                btn.innerHTML = sidebar.classList.contains('closed') ? '<i class="fa-solid fa-bars"></i>' : '<i class="fa-solid fa-xmark"></i>';
            };
        });
    </script>
